<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Kytherion Drift</title>
<meta name="description" content="Play Kytherion Drift, a self-contained browser arcade shooter with exotic weapon pickups, boss waves, touch controls, and keyboard movement.">

<meta property="og:title" content="Kytherion Drift">
<meta property="og:description" content="A self-contained browser arcade shooter with exotic weapon pickups, boss waves, touch controls, and keyboard movement.">

    justify-content: center;
    align-items: center;

<body>
<canvas id="gameCanvas" role="img" aria-label="Kytherion Drift arcade shooter game canvas"></canvas>
<noscript>Kytherion Drift needs JavaScript enabled to run in your browser.</noscript>
<script>
// ─── CANVAS SETUP ──────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const BASE_W = 1280;
const BASE_H = 720;
const ASPECT = 16 / 9;

const WEAPONS = {
  laser: {
    name: 'PHOTON LANCE',
    short: 'PH',
    pickup: 'P',
    color: '#3ff8ff',
    core: '#f7ffff',
    glow: '#0cc8ff',
    damageType: 'photonic shear'
  },
  lightning: {
    name: 'ARC TEMPEST',
    short: 'AT',
    pickup: 'A',
    color: '#9a7cff',
    core: '#ffffff',
    glow: '#6c45ff',
    damageType: 'ion lattice'
  },
  missiles: {
    name: 'GRAVITON SWARM',
    short: 'GV',
    pickup: 'G',
    color: '#ffcf5a',
    core: '#fff3b0',
    glow: '#ff6b1a',
    damageType: 'singularity rupture'
  }
};

function resize() {
  let displayW = window.innerWidth;
  let displayH = displayW / ASPECT;
  if (displayH > window.innerHeight) {
    displayH = window.innerHeight;
    displayW = displayH * ASPECT;
  }
  canvas.width = BASE_W;
  canvas.height = BASE_H;
  canvas.style.width = displayW + 'px';
  canvas.style.height = displayH + 'px';
}
resize();
window.addEventListener('resize', resize);

// ─── GAME STATE ────────────────────────────────────────────────
const STATE = { TITLE: 0, PLAYING: 1, BOSS: 2, LEVEL_UP: 3, GAME_OVER: 4, WIN: 5 };
let gameState = STATE.TITLE;
let score = 0;
let hiScore = 0;
let wave = 1;
let level = 1;
let frameCount = 0;
let levelUpTimer = 0;

// ─── STARS BACKGROUND ──────────────────────────────────────────
const stars = [];
for (let i = 0; i < 180; i++) {
  stars.push({
    x: Math.random() * BASE_W,
    y: Math.random() * BASE_H,
    r: Math.random() * 1.5 + 0.2,
    speed: Math.random() * 1.5 + 0.3,
    brightness: Math.random() * 0.7 + 0.3,
  });
}
function drawStars() {
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > BASE_H) { s.y = 0; s.x = Math.random() * BASE_W; }
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
    ctx.fill();
  }
}

// Nebula clouds (static decorative)
const nebulas = [];
for (let i = 0; i < 5; i++) {
  nebulas.push({
    x: Math.random() * BASE_W,
    y: Math.random() * BASE_H,
    rx: Math.random() * 120 + 60,
    ry: Math.random() * 60 + 30,
    hue: Math.random() < 0.5 ? 270 : 210,
    a: Math.random() * 0.07 + 0.02,
    speed: Math.random() * 0.3 + 0.1,
  });
}
function drawNebulas() {
  for (const n of nebulas) {
    n.y += n.speed;
    if (n.y - n.ry > BASE_H) n.y = -n.ry;
    const g = ctx.createRadialGradient(n.x, n.y, 0, n.x, n.y, Math.max(n.rx, n.ry));
    g.addColorStop(0, `hsla(${n.hue},80%,60%,${n.a * 2})`);
    g.addColorStop(1, `hsla(${n.hue},80%,40%,0)`);
    ctx.save();
    ctx.scale(1, n.ry / n.rx);
    ctx.beginPath();
    ctx.arc(n.x, n.y * (n.rx / n.ry), n.rx, 0, Math.PI * 2);
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
  }
}

// ─── PLAYER ────────────────────────────────────────────────────
const player = {
  x: BASE_W / 2, y: BASE_H - 100,
  w: 40, h: 50,
  speed: 7,
  hp: 100, maxHp: 100,
  shield: 0,
  fireRate: 9,
  fireTick: 0,
  unlockedWeapons: { laser: true, lightning: false, missiles: false },
  weaponLevels: { laser: 1, lightning: 0, missiles: 0 },
  componentOrder: ['laser'],
  bombs: 0,
  lives: 3,
  invincible: 0,    // frames of invincibility after hit
  dead: false,
  thrusterPhase: 0,
};

// Drag/touch control
let drag = { active: false, startX: 0, startY: 0, px: 0, py: 0 };
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = BASE_W / rect.width;
  const scaleY = BASE_H / rect.height;
  drag.active = true;
  drag.startX = t.clientX * scaleX - rect.left * scaleX;
  drag.startY = t.clientY * scaleY - rect.top * scaleY;
  drag.px = player.x;
  drag.py = player.y;
  if (gameState === STATE.TITLE || gameState === STATE.GAME_OVER || gameState === STATE.WIN) startGame();
}, { passive: false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  const scaleX = BASE_W / rect.width;
  const scaleY = BASE_H / rect.height;
  const cx = t.clientX * scaleX - rect.left * scaleX;
  const cy = t.clientY * scaleY - rect.top * scaleY;
  player.x = clamp(drag.px + (cx - drag.startX), 25, BASE_W - 25);
  player.y = clamp(drag.py + (cy - drag.startY), BASE_H * 0.3, BASE_H - 60);
}, { passive: false });
canvas.addEventListener('touchend', () => { drag.active = false; });

// Keyboard
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ((gameState === STATE.TITLE || gameState === STATE.GAME_OVER || gameState === STATE.WIN) && e.key === ' ') startGame();
  if (gameState === STATE.PLAYING || gameState === STATE.BOSS) {
    if (e.key === 'b' || e.key === 'B') fireBomb();
  }
});
window.addEventListener('keyup', e => { keys[e.key] = false; });
canvas.addEventListener('click', () => {
  if (gameState === STATE.TITLE || gameState === STATE.GAME_OVER || gameState === STATE.WIN) startGame();
});

function clamp(v, mn, mx) { return Math.max(mn, Math.min(mx, v)); }

// ─── BULLETS ───────────────────────────────────────────────────
let playerBullets = [];
let enemyBullets = [];

function spawnPlayerBullet() {
  // Components cooperate instead of replacing one another.
  if (player.weaponLevels.laser > 0) spawnLaserSpray();
  if (player.weaponLevels.lightning > 0) spawnLightningShot();
  if (player.weaponLevels.missiles > 0) spawnMissileShot();
}

function spawnLaserSpray() {
  const level = player.weaponLevels.laser;
  const count = level === 1 ? 3 : level === 2 ? 5 : 7;
  const size = 7 + level * 3;
  const spread = level === 1 ? 0.45 : level === 2 ? 0.75 : 1.05;
  for (let i = 0; i < count; i++) {
    const t = count === 1 ? 0 : (i / (count - 1) - 0.5) * 2;
    playerBullets.push({
      x: player.x + t * 12,
      y: player.y - 32,
      vx: t * spread,
      vy: -17,
      type: 'laser',
      damage: 22 + level * 12,
      w: size,
      h: 24 + level * 8,
      color: WEAPONS.laser.color,
      core: WEAPONS.laser.core,
      damageType: WEAPONS.laser.damageType
    });
  }
}

function spawnLightningShot() {
  const level = player.weaponLevels.lightning;
  const count = Math.min(5, 1 + Math.floor((level - 1) / 2));
  const cone = 0.16 + level * 0.08;
  const offsets = Array.from({ length: count }, (_, i) => (i - (count - 1) / 2) * 16);
  for (const ox of offsets) {
    const i = offsets.indexOf(ox);
    const spread = count === 1 ? 0 : (i / (count - 1) - 0.5) * cone * 2;
    const length = 94 + level * 24;
    const segments = 8 + Math.min(level, 5);
    const points = [{ x: 0, y: 0 }];
    let jitter = 0;
    for (let step = 1; step <= segments; step++) {
      jitter = clamp(jitter + (Math.random() - 0.5) * (18 + level * 2), -(18 + level * 3), 18 + level * 3);
      points.push({
        x: Math.sin(spread) * length * (step / segments) + jitter,
        y: -Math.cos(spread) * length * (step / segments)
      });
    }
    const forks = [];
    for (let fork = 0; fork < Math.floor(level / 3); fork++) {
      const root = points[3 + Math.floor(Math.random() * Math.max(1, points.length - 5))];
      const forkPoints = [{ x: root.x, y: root.y }];
      let fx = root.x, fy = root.y;
      let angle = -Math.PI / 2 + spread + (Math.random() - 0.5) * 1.05;
      for (let step = 0; step < 3; step++) {
        angle += (Math.random() - 0.5) * 0.5;
        const segment = 16 + Math.random() * 16;
        fx += Math.cos(angle) * segment;
        fy += Math.sin(angle) * segment;
        forkPoints.push({ x: fx, y: fy });
      }
      forks.push(forkPoints);
    }
    playerBullets.push({
      x: player.x + ox,
      y: player.y - 34,
      vx: Math.sin(spread) * 8,
      vy: -Math.cos(spread) * 18,
      type: 'lightning',
      damage: 22 + level * 11,
      w: 8 + Math.min(level, 5) * 2,
      h: length,
      points,
      forks,
      ttl: 13,
      age: 0,
      pierce: 1 + Math.ceil(level / 2),
      color: WEAPONS.lightning.color,
      core: WEAPONS.lightning.core,
      damageType: WEAPONS.lightning.damageType
    });
  }
}

function spawnMissileShot() {
  const level = player.weaponLevels.missiles;
  const count = Math.min(4, 1 + Math.floor((level - 1) / 3));
  const offsets = Array.from({ length: count }, (_, i) => (i - (count - 1) / 2) * 18);
  for (const ox of offsets) {
    playerBullets.push({
      x: player.x + ox,
      y: player.y - 18,
      vx: ox * 0.03,
      vy: -10,
      type: 'missile',
      damage: 28 + level * 12,
      w: 4.5,
      h: 13,
      r: 4,
      color: WEAPONS.missiles.color,
      core: WEAPONS.missiles.core,
      damageType: WEAPONS.missiles.damageType,
      trailPhase: Math.random() * Math.PI * 2
    });
  }
}

function drawPlayerBullet(b) {
  ctx.save();
  ctx.shadowBlur = 18;
  ctx.shadowColor = b.color;
  if (b.type === 'missile') {
    ctx.translate(b.x, b.y);
    ctx.rotate(Math.atan2(b.vy, b.vx) + Math.PI / 2);
    const flame = ctx.createRadialGradient(0, b.h * 0.45, 0, 0, b.h * 0.45, b.r * 1.8);
    flame.addColorStop(0, '#ffffff');
    flame.addColorStop(0.2, '#ffd36a');
    flame.addColorStop(0.55, '#ff5b18');
    flame.addColorStop(1, 'rgba(255,40,0,0)');
    ctx.fillStyle = flame;
    ctx.beginPath();
    ctx.ellipse(0, b.h * 0.48, b.r * 0.7, b.r * 1.8, 0, 0, Math.PI * 2);
    ctx.fill();

    const body = ctx.createLinearGradient(0, -b.h, 0, b.h * 0.35);
    body.addColorStop(0, '#fff9d8');
    body.addColorStop(0.35, '#ffcf5a');
    body.addColorStop(1, '#8b3b00');
    ctx.fillStyle = body;
    ctx.beginPath();
    ctx.moveTo(0, -b.h);
    ctx.lineTo(-b.w * 0.72, b.h * 0.12);
    ctx.lineTo(-b.w * 0.34, b.h * 0.3);
    ctx.lineTo(0, b.h * 0.42);
    ctx.lineTo(b.w * 0.34, b.h * 0.3);
    ctx.lineTo(b.w * 0.72, b.h * 0.12);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#fff0a0';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  } else if (b.type === 'lightning') {
    ctx.lineCap = 'round';
    for (let pass = 0; pass < 3; pass++) {
      ctx.globalAlpha = pass === 0 ? 0.22 : pass === 1 ? 0.78 : 1;
      ctx.strokeStyle = pass === 0 ? '#4f2ec5' : pass === 1 ? '#9178ff' : '#d4c8ff';
      ctx.lineWidth = pass === 0 ? b.w * 1.15 : pass === 1 ? b.w * 0.44 : Math.max(1.2, b.w * 0.1);
      ctx.beginPath();
      ctx.moveTo(b.x + b.points[0].x, b.y + b.points[0].y);
      for (let i = 1; i < b.points.length; i++) ctx.lineTo(b.x + b.points[i].x, b.y + b.points[i].y);
      ctx.stroke();
    }
    ctx.globalAlpha = 0.75;
    ctx.strokeStyle = '#9d86ff';
    ctx.lineWidth = Math.max(1.1, b.w * 0.12);
    for (const fork of b.forks) {
      ctx.beginPath();
      ctx.moveTo(b.x + fork[0].x, b.y + fork[0].y);
      for (let i = 1; i < fork.length; i++) ctx.lineTo(b.x + fork[i].x, b.y + fork[i].y);
      ctx.stroke();
    }
  } else {
    const halo = ctx.createRadialGradient(b.x, b.y - b.h * 0.45, 0, b.x, b.y - b.h * 0.45, b.h);
    halo.addColorStop(0, 'rgba(255,255,255,0.42)');
    halo.addColorStop(0.35, 'rgba(63,248,255,0.22)');
    halo.addColorStop(1, 'rgba(0,180,255,0)');
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y - b.h * 0.45, b.w * 2.3, b.h * 0.9, 0, 0, Math.PI * 2);
    ctx.fill();

    const grad = ctx.createLinearGradient(b.x, b.y - b.h, b.x, b.y);
    grad.addColorStop(0, b.core || '#ffffff');
    grad.addColorStop(0.2, '#b9ffff');
    grad.addColorStop(0.65, b.color);
    grad.addColorStop(1, 'rgba(0,220,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(b.x - b.w / 2, b.y - b.h, b.w, b.h, b.w / 2);
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(b.x - Math.max(1, b.w * 0.12), b.y - b.h * 0.88, Math.max(2, b.w * 0.24), b.h * 0.58);
  }
  ctx.restore();
}

function findNearestTarget(x, y) {
  let nearest = null;
  let best = Infinity;
  for (const e of enemies) {
    const dx = e.x - x, dy = e.y - y;
    const d = dx * dx + dy * dy;
    if (d < best) { best = d; nearest = e; }
  }
  if (boss && boss.entryDone && !boss.dead) {
    const dx = boss.x - x, dy = boss.y - y;
    const d = dx * dx + dy * dy;
    if (d < best) nearest = boss;
  }
  return nearest;
}

// ─── PARTICLES / EXPLOSIONS ────────────────────────────────────
let particles = [];
let damageNumbers = [];

function spawnExplosion(x, y, count, color1, color2, big) {
  for (let i = 0; i < count * 1.4; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * (big ? 7 : 4.6) + 1;
    particles.push({
      type: 'ember',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * (big ? 8 : 4) + 1.5,
      life: 1,
      decay: Math.random() * 0.035 + 0.014,
      color: Math.random() < 0.5 ? color1 : color2,
    });
  }
  for (let i = 0; i < count * 0.45; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * (big ? 2.2 : 1.4) + 0.3;
    particles.push({
      type: 'smoke',
      x: x + (Math.random() - 0.5) * (big ? 40 : 18),
      y: y + (Math.random() - 0.5) * (big ? 40 : 18),
      vx: Math.cos(angle) * speed * 0.45,
      vy: Math.sin(angle) * speed * 0.45 - 0.35,
      r: Math.random() * (big ? 24 : 12) + 7,
      life: 0.75,
      decay: Math.random() * 0.012 + 0.006,
      color: big ? '#31233a' : '#2b2530',
    });
  }
  for (let i = 0; i < count * 0.5; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * (big ? 11 : 7) + 3;
    particles.push({
      type: 'spark',
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: Math.random() * 2 + 1,
      life: 1,
      decay: Math.random() * 0.05 + 0.025,
      color: color2,
    });
  }
  if (big) {
    particles.push({ type: 'ring', x, y, r: 8, maxR: 120, life: 1, decay: 0.028, color: color2 });
  }
}

function spawnDamageNumber(x, y, dmg) {
  damageNumbers.push({ x, y, val: dmg, life: 1, vy: -1.5, decay: 0.025 });
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    if (p.type === 'ring') {
      p.r += 3;
      p.life -= p.decay;
    } else if (p.type === 'smoke') {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.985;
      p.vy -= 0.01;
      p.r += 0.25;
      p.life -= p.decay;
    } else if (p.type === 'spark') {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.97;
      p.vy *= 0.97;
      p.life -= p.decay;
    } else {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.vx *= 0.99;
      p.life -= p.decay;
    }
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = damageNumbers.length - 1; i >= 0; i--) {
    const d = damageNumbers[i];
    d.y += d.vy;
    d.x += (Math.random() - 0.5) * 0.5;
    d.life -= d.decay;
    if (d.life <= 0) damageNumbers.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, p.life);
    if (p.type === 'ring') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(255,230,160,${p.life})`;
      ctx.lineWidth = 4;
      ctx.stroke();
    } else if (p.type === 'smoke') {
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      g.addColorStop(0, `rgba(90,80,105,${0.22 * p.life})`);
      g.addColorStop(0.6, `rgba(40,35,50,${0.16 * p.life})`);
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'spark') {
      ctx.shadowBlur = 10;
      ctx.shadowColor = p.color;
      ctx.strokeStyle = p.color;
      ctx.lineWidth = p.r;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 1.8, p.y - p.vy * 1.8);
      ctx.stroke();
    } else {
      ctx.shadowBlur = 18;
      ctx.shadowColor = p.color;
      const hot = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 3);
      hot.addColorStop(0, '#ffffff');
      hot.addColorStop(0.18, '#ffe8a8');
      hot.addColorStop(0.48, p.color);
      hot.addColorStop(1, 'rgba(255,60,0,0)');
      ctx.fillStyle = hot;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * (0.6 + p.life * 1.4), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
  // Damage numbers
  for (const d of damageNumbers) {
    ctx.save();
    ctx.globalAlpha = d.life;
    ctx.shadowBlur = 6;
    ctx.shadowColor = '#ff6600';
    ctx.font = `bold ${Math.floor(d.val > 999 ? 16 : 13)}px Arial`;
    ctx.fillStyle = d.val > 4999 ? '#ffcc00' : '#ff9900';
    ctx.textAlign = 'center';
    ctx.fillText(d.val.toLocaleString(), d.x, d.y);
    ctx.restore();
  }
}

// ─── POWER-UPS ─────────────────────────────────────────────────
let powerUps = [];
const PU_TYPES = ['laser', 'lightning', 'missiles', 'bomb', 'shield', 'health'];
const MODULE_TYPES = ['laser', 'lightning', 'missiles'];
const MODULE_SLOTS = [
  { x: -22, y: 4, rot: -0.34 }, { x: 22, y: 4, rot: 0.34 },
  { x: -28, y: 15, rot: -0.52 }, { x: 28, y: 15, rot: 0.52 },
  { x: -13, y: 18, rot: -0.18 }, { x: 13, y: 18, rot: 0.18 },
  { x: -20, y: -13, rot: -0.22 }, { x: 20, y: -13, rot: 0.22 },
  { x: -9, y: -23, rot: -0.08 }, { x: 9, y: -23, rot: 0.08 }
];
let dockingModules = [];

function spawnPowerUp(x, y) {
  if (Math.random() > 0.5) return;
  const type = PU_TYPES[Math.floor(Math.random() * PU_TYPES.length)];
  powerUps.push({ x, y, type, vx: (Math.random() - 0.5) * 1.6, vy: 1.35, r: 18, phase: Math.random() * Math.PI * 2 });
}

function drawModuleHardware(type, scale = 1) {
  const color = WEAPONS[type].color;
  ctx.save();
  ctx.scale(scale, scale);
  ctx.shadowBlur = 11;
  ctx.shadowColor = color;
  ctx.fillStyle = '#121a27';
  ctx.strokeStyle = '#8294a8';
  ctx.lineWidth = 1.3;

  if (type === 'laser') {
    // A wing cannon: armored mounting plate, heat sink, and forward emitter.
    ctx.fillRect(-10, -4, 20, 12);
    ctx.strokeRect(-10, -4, 20, 12);
    ctx.fillStyle = '#526779';
    [-6, 0, 6].forEach(x => ctx.fillRect(x - 1, 6, 2, 5));
    ctx.fillStyle = color;
    ctx.fillRect(-3, -17, 6, 15);
    ctx.fillStyle = '#f7ffff';
    ctx.fillRect(-1, -16, 2, 12);
  } else if (type === 'lightning') {
    // A contained arc capacitor: coil housing rather than a floating bolt.
    ctx.fillRect(-9, -7, 18, 15);
    ctx.strokeRect(-9, -7, 18, 15);
    ctx.strokeStyle = color;
    ctx.lineWidth = 2.2;
    ctx.beginPath();
    ctx.ellipse(0, -2, 6, 9, 0, 0, Math.PI * 2);
    ctx.stroke();
    ctx.fillStyle = color;
    ctx.fillRect(-2, -6, 4, 9);
    ctx.fillStyle = '#f7ffff';
    ctx.fillRect(-1, -4, 2, 5);
  } else {
    // A compact missile pod with two recessed launch tubes.
    ctx.fillRect(-11, -8, 22, 16);
    ctx.strokeRect(-11, -8, 22, 16);
    ctx.fillStyle = '#c88d2b';
    [-5, 5].forEach(x => {
      ctx.fillRect(x - 3, -12, 6, 13);
      ctx.fillStyle = '#fff3b0';
      ctx.fillRect(x - 1, -11, 2, 4);
      ctx.fillStyle = '#c88d2b';
    });
  }
  ctx.restore();
}

function drawSupplyPod(type) {
  const colors = { bomb: '#ff44aa', shield: '#00aaff', health: '#00ff88' };
  ctx.shadowBlur = 12;
  ctx.shadowColor = colors[type];
  ctx.fillStyle = '#111a25';
  ctx.strokeStyle = colors[type];
  ctx.lineWidth = 1.8;
  ctx.fillRect(-9, -11, 18, 22);
  ctx.strokeRect(-9, -11, 18, 22);
  ctx.fillStyle = colors[type];
  if (type === 'bomb') {
    ctx.beginPath(); ctx.arc(0, 2, 6, 0, Math.PI * 2); ctx.fill();
    ctx.fillRect(-1, -10, 2, 5);
  } else if (type === 'shield') {
    ctx.beginPath(); ctx.moveTo(0, -9); ctx.lineTo(7, -4); ctx.lineTo(5, 8); ctx.lineTo(0, 11); ctx.lineTo(-5, 8); ctx.lineTo(-7, -4); ctx.closePath(); ctx.fill();
  } else {
    ctx.fillRect(-3, -7, 6, 14);
    ctx.fillStyle = '#eafff4';
    ctx.fillRect(-7, -3, 14, 6);
  }
}

function drawPowerUp(p) {
  p.phase += 0.05;
  p.y += p.vy;
  ctx.save();
  const pull = player.x - p.x;
  if (Math.abs(pull) < 300) p.vx += Math.sign(pull) * 0.018;
  p.vx *= 0.985;
  p.x += p.vx + Math.sin(p.phase * 1.5) * 0.35;
  p.x = clamp(p.x, 24, BASE_W - 24);
  ctx.translate(p.x, p.y);
  ctx.rotate(Math.sin(p.phase) * 0.18);
  if (MODULE_TYPES.includes(p.type)) drawModuleHardware(p.type);
  else drawSupplyPod(p.type);
  ctx.restore();
}

function drawInstalledModule(type, slotIndex) {
  const slot = MODULE_SLOTS[slotIndex];
  if (!slot) return;
  ctx.save();
  ctx.translate(slot.x, slot.y);
  ctx.rotate(slot.rot);
  ctx.strokeStyle = '#71869b';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, 10);
  ctx.lineTo(0, 18);
  ctx.stroke();
  drawModuleHardware(type, 0.72);
  ctx.restore();
}

function startModuleDocking(p) {
  dockingModules.push({
    type: p.type,
    x: p.x,
    y: p.y,
    spin: p.phase,
    progress: 0,
    slotIndex: Math.min(player.componentOrder.length + dockingModules.length, MODULE_SLOTS.length - 1)
  });
}

function updateDockingModules() {
  for (let i = dockingModules.length - 1; i >= 0; i--) {
    const module = dockingModules[i];
    module.progress += 0.055;
    if (module.progress >= 1) {
      collectPowerUp(module.type);
      spawnExplosion(player.x, player.y, 10, WEAPONS[module.type].color, '#ffffff', false);
      dockingModules.splice(i, 1);
    }
  }
}

function drawDockingModules() {
  for (const module of dockingModules) {
    const slot = MODULE_SLOTS[module.slotIndex];
    const ease = 1 - Math.pow(1 - Math.min(module.progress, 1), 3);
    const targetX = player.x + slot.x;
    const targetY = player.y + slot.y;
    const x = module.x + (targetX - module.x) * ease;
    const y = module.y + (targetY - module.y) * ease;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(module.spin + ease * slot.rot);
    drawModuleHardware(module.type, 1 - ease * 0.28);
    ctx.restore();
  }
}

function collectPowerUp(type) {
  if (type === 'laser' || type === 'lightning' || type === 'missiles') {
    // The ship holds ten physical weapon components. New modules eject the
    // oldest removable component so every pickup has a meaningful tradeoff.
    while (player.componentOrder.length >= 10) {
      const removeAt = player.componentOrder.findIndex(component => component !== 'laser' || player.weaponLevels.laser > 1);
      const removed = player.componentOrder.splice(removeAt < 0 ? 0 : removeAt, 1)[0];
      player.weaponLevels[removed] = Math.max(removed === 'laser' ? 1 : 0, player.weaponLevels[removed] - 1);
    }
    player.unlockedWeapons[type] = true;
    player.componentOrder.push(type);
    player.weaponLevels[type]++;
  } else if (type === 'bomb') {
    player.bombs = Math.min(9, player.bombs + 1);
  } else if (type === 'shield') {
    player.shield = Math.min(3, player.shield + 1);
  } else if (type === 'health') {
    player.hp = Math.min(player.maxHp, player.hp + 30);
  }
}

// ─── ENEMIES ───────────────────────────────────────────────────
let enemies = [];
let enemyWaveTimer = 0;
let waveEnemyCount = 0;

const ENEMY_TYPES = {
  grunt:       { hp: 35,  color: '#788394', accentColor: '#bdcbdd', score: 100, fireRate: 118, size: 20, behavior: 'drift', variant: 'dart' },
  fighter:     { hp: 80,  color: '#c54120', accentColor: '#ff9a4b', score: 250, fireRate: 98, size: 25, behavior: 'weave', variant: 'wing' },
  heavy:       { hp: 210, color: '#405dae', accentColor: '#8fc1ff', score: 500, fireRate: 132, size: 33, behavior: 'anchor', variant: 'heavy' },
  interceptor: { hp: 65,  color: '#8b3ba5', accentColor: '#ef8cff', score: 300, fireRate: 108, size: 21, behavior: 'dive', variant: 'needle' },
  weaver:      { hp: 110, color: '#168c80', accentColor: '#6dffe7', score: 400, fireRate: 112, size: 27, behavior: 'orbit', variant: 'crescent' },
  drone:       { hp: 145, color: '#80611d', accentColor: '#ffe071', score: 450, fireRate: 126, size: 29, behavior: 'anchor', variant: 'drone' },
};

function spawnWave() {
  const rosters = [
    ['grunt', 'grunt', 'fighter'],
    ['fighter', 'interceptor', 'weaver'],
    ['heavy', 'interceptor', 'weaver', 'drone'],
  ];
  const roster = rosters[Math.min(2, Math.floor((wave - 1) / 3))];
  const type = roster[Math.floor(Math.random() * roster.length)];
  const clusterX = BASE_W * (0.24 + Math.random() * 0.52);
  const count = 5 + Math.min(4, Math.floor(wave / 2));
  const formations = [
    // Stacked wedge: depth comes from rows, not a wall across the screen.
    () => {
      for (let i = 0; i < count; i++) {
        const row = Math.floor(i / 3), col = (i % 3) - 1;
        enemies.push(makeEnemy(type, clusterX + col * 62 + row * 10, 95 + row * 58, { entry: i % 2 ? 'loop-right' : 'loop-left' }));
      }
    },
    // Corkscrew column.
    () => {
      for (let i = 0; i < count; i++) {
        const angle = i * 0.9;
        enemies.push(makeEnemy(type, clusterX + Math.cos(angle) * 76, 95 + i * 42, { entry: 'spiral', phase: angle }));
      }
    },
    // Two compact flanking cells that loop inward from different angles.
    () => {
      for (let i = 0; i < count; i++) {
        const side = i % 2 === 0 ? -1 : 1;
        const row = Math.floor(i / 2);
        enemies.push(makeEnemy(type, clusterX + side * (48 + row * 18), 100 + row * 66, { entry: side < 0 ? 'loop-left' : 'loop-right' }));
      }
    },
  ];
  formations[Math.floor(Math.random() * formations.length)]();
  waveEnemyCount = enemies.length;
}

function makeEnemy(type, x, y, options = {}) {
  const t = ENEMY_TYPES[type];
  const entry = options.entry || 'loop-left';
  const fromLeft = entry === 'loop-left';
  return {
    x: fromLeft ? -70 : entry === 'loop-right' ? BASE_W + 70 : x,
    y: entry === 'spiral' ? -70 : -45,
    targetX: x, targetY: y,
    startX: fromLeft ? -70 : entry === 'loop-right' ? BASE_W + 70 : x,
    startY: entry === 'spiral' ? -70 : -45,
    vx: 0, vy: 0,
    type,
    hp: t.hp * (1 + (wave - 1) * 0.15),
    maxHp: t.hp * (1 + (wave - 1) * 0.15),
    color: t.color, accentColor: t.accentColor,
    score: t.score,
    fireRate: t.fireRate,
    fireTick: Math.floor(Math.random() * t.fireRate),
    size: t.size,
    phase: options.phase || Math.random() * Math.PI * 2,
    behavior: t.behavior,
    variant: t.variant,
    entry,
    entryTick: Math.floor(Math.random() * 22),
    entryDuration: 92 + Math.floor(Math.random() * 35),
    entryDone: false,
    age: 0,
    baseX: x,
    dead: false,
    hitFlash: 0,
  };
}

function drawEnemy(e) {
  e.phase += 0.04;

  ctx.save();
  ctx.translate(e.x, e.y);

  if (e.hitFlash > 0) {
    ctx.globalAlpha = 0.5 + 0.5 * Math.sin(e.hitFlash * 0.5);
    e.hitFlash--;
  }

  const s = e.size;
  ctx.shadowBlur = 18;
  ctx.shadowColor = e.accentColor;

  const hull = ctx.createLinearGradient(0, -s, 0, s * 0.7);
  hull.addColorStop(0, '#f5f7ff');
  hull.addColorStop(0.18, e.accentColor);
  hull.addColorStop(0.48, e.color);
  hull.addColorStop(1, '#080a12');

  ctx.fillStyle = hull;
  ctx.beginPath();
  ctx.moveTo(0, -s * 1.05);
  ctx.lineTo(-s * 0.22, -s * 0.35);
  ctx.lineTo(-s * 0.95, s * 0.18);
  ctx.lineTo(-s * 0.52, s * 0.36);
  ctx.lineTo(-s * 0.28, s * 0.74);
  ctx.lineTo(0, s * 0.5);
  ctx.lineTo(s * 0.28, s * 0.74);
  ctx.lineTo(s * 0.52, s * 0.36);
  ctx.lineTo(s * 0.95, s * 0.18);
  ctx.lineTo(s * 0.22, -s * 0.35);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.42)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Silhouettes make each enemy behavior legible before it starts firing.
  ctx.strokeStyle = e.accentColor;
  ctx.fillStyle = e.accentColor;
  ctx.lineWidth = 1.5;
  if (e.variant === 'needle') {
    ctx.beginPath(); ctx.moveTo(-s * 0.22, s * 0.55); ctx.lineTo(0, -s * 1.28); ctx.lineTo(s * 0.22, s * 0.55); ctx.stroke();
  } else if (e.variant === 'crescent') {
    ctx.beginPath(); ctx.arc(0, -s * 0.06, s * 0.72, Math.PI * 0.18, Math.PI * 0.82); ctx.stroke();
  } else if (e.variant === 'drone') {
    [-1, 1].forEach(side => { ctx.fillRect(side * s * 0.7 - 3, -3, 6, 6); });
  } else if (e.variant === 'heavy') {
    ctx.fillRect(-s * 0.48, s * 0.1, s * 0.96, s * 0.2);
  }

  const canopy = ctx.createLinearGradient(0, -s * 0.62, 0, s * 0.12);
  canopy.addColorStop(0, '#ffffff');
  canopy.addColorStop(0.3, e.accentColor);
  canopy.addColorStop(1, 'rgba(10,20,36,0.7)');
  ctx.fillStyle = canopy;
  ctx.beginPath();
  ctx.ellipse(0, -s * 0.22, s * 0.2, s * 0.42, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.strokeStyle = e.accentColor;
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(-s * 0.72, s * 0.16);
  ctx.lineTo(-s * 0.18, -s * 0.18);
  ctx.lineTo(0, s * 0.36);
  ctx.lineTo(s * 0.18, -s * 0.18);
  ctx.lineTo(s * 0.72, s * 0.16);
  ctx.moveTo(-s * 0.25, s * 0.56);
  ctx.lineTo(s * 0.25, s * 0.56);
  ctx.stroke();

  const exhaust = ctx.createRadialGradient(0, s * 0.82, 0, 0, s * 0.82, s * 0.36);
  exhaust.addColorStop(0, '#ffffff');
  exhaust.addColorStop(0.25, e.accentColor);
  exhaust.addColorStop(1, 'rgba(255,80,0,0)');
  ctx.fillStyle = exhaust;
  ctx.beginPath();
  ctx.ellipse(0, s * 0.76, s * 0.18, s * 0.3, 0, 0, Math.PI * 2);
  ctx.fill();

  // HP bar (if damaged)
  if (e.hp < e.maxHp) {
    const barW = s * 1.6;
    ctx.fillStyle = '#330000';
    ctx.fillRect(-barW / 2, -s - 10, barW, 5);
    ctx.fillStyle = `hsl(${(e.hp / e.maxHp) * 120},100%,50%)`;
    ctx.fillRect(-barW / 2, -s - 10, barW * (e.hp / e.maxHp), 5);
  }

  ctx.restore();
}

function enemyFireBullet(e) {
  if (enemyBullets.length > 72) return;
  const speed = 2.65 + Math.min(wave, 9) * 0.1;
  const shots = e.type === 'heavy' || e.type === 'drone' ? [-0.13, 0.13] : [0];
  const tilt = Math.sin(e.phase * 0.7) * 0.18;
  for (const offset of shots) {
    const angle = Math.PI / 2 + tilt + offset;
    enemyBullets.push({
      x: e.x, y: e.y + e.size * 0.45,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      r: e.type === 'heavy' ? 4.5 : 3.6,
      life: 1,
      color: e.accentColor,
    });
  }
}

function drawEnemyBullet(b) {
  ctx.save();
  ctx.shadowBlur = 14;
  ctx.shadowColor = b.color;
  // Glowing orb
  const g = ctx.createRadialGradient(b.x, b.y, 0, b.x, b.y, b.r);
  g.addColorStop(0, '#ffffff');
  g.addColorStop(0.4, b.color);
  g.addColorStop(1, `${b.color}00`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.arc(b.x, b.y, b.r * 1.8, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// ─── BOSS ──────────────────────────────────────────────────────
let boss = null;
let bossPhase = 0;
let bossAngle = 0;
let bossFireTick = 0;
let bossBulletPattern = 0;

function spawnBoss() {
  gameState = STATE.BOSS;
  const tier = Math.ceil(wave / 3);
  boss = {
    x: BASE_W / 2,
    y: -120,
    targetY: 200,
    w: 140,
    h: 120,
    hp: 3000 + tier * 2000,
    maxHp: 3000 + tier * 2000,
    phase: 0,
    moveDir: 1,
    hitFlash: 0,
    tier,
    dead: false,
    entryDone: false,
    glowPhase: 0,
  };
  enemies = [];
  enemyBullets = [];
  bossAngle = 0;
  bossFireTick = 0;
  bossBulletPattern = 0;
}

function drawBoss(b) {
  b.phase += 0.03;
  b.glowPhase += 0.05;

  // Entry animation
  if (!b.entryDone) {
    b.y += 2.5;
    if (b.y >= b.targetY) { b.y = b.targetY; b.entryDone = true; }
  } else {
    // Hover movement
    b.x += b.moveDir * 1.2;
    if (b.x > BASE_W - b.w / 2 - 10 || b.x < b.w / 2 + 10) b.moveDir *= -1;
    b.y = b.targetY + Math.sin(b.phase) * 12;
  }

  ctx.save();
  ctx.translate(b.x, b.y);

  if (b.hitFlash > 0) {
    ctx.globalAlpha = 0.4 + 0.6 * Math.sin(b.hitFlash);
    b.hitFlash--;
  }

  const hw = b.w / 2;
  const hh = b.h / 2;
  const pulse = 1 + Math.sin(b.glowPhase) * 0.05;

  ctx.save();
  ctx.scale(pulse, pulse);

  // Outer glow
  ctx.shadowBlur = 30 + Math.sin(b.glowPhase) * 10;
  ctx.shadowColor = b.tier >= 2 ? '#ff4400' : '#cc44ff';

  // Main body - large mechanical hull
  ctx.fillStyle = b.tier >= 2 ? '#5a1a00' : '#1a0033';
  ctx.beginPath();
  ctx.moveTo(0, -hh * 1.1);
  ctx.lineTo(-hw * 0.5, -hh * 0.6);
  ctx.lineTo(-hw * 1.0, -hh * 0.2);
  ctx.lineTo(-hw * 0.9, hh * 0.5);
  ctx.lineTo(-hw * 0.3, hh * 1.0);
  ctx.lineTo(hw * 0.3, hh * 1.0);
  ctx.lineTo(hw * 0.9, hh * 0.5);
  ctx.lineTo(hw * 1.0, -hh * 0.2);
  ctx.lineTo(hw * 0.5, -hh * 0.6);
  ctx.closePath();
  ctx.fill();

  // Wing details
  ctx.fillStyle = b.tier >= 2 ? '#882200' : '#442288';
  ctx.beginPath();
  ctx.moveTo(-hw * 0.6, -hh * 0.1);
  ctx.lineTo(-hw * 1.0, -hh * 0.2);
  ctx.lineTo(-hw * 0.9, hh * 0.5);
  ctx.lineTo(-hw * 0.4, hh * 0.3);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(hw * 0.6, -hh * 0.1);
  ctx.lineTo(hw * 1.0, -hh * 0.2);
  ctx.lineTo(hw * 0.9, hh * 0.5);
  ctx.lineTo(hw * 0.4, hh * 0.3);
  ctx.closePath();
  ctx.fill();

  // Core reactor (glowing center)
  const coreG = ctx.createRadialGradient(0, 0, 0, 0, 0, 28);
  const coreColor = b.tier >= 2 ? '#ff6600' : '#cc44ff';
  coreG.addColorStop(0, '#ffffff');
  coreG.addColorStop(0.3, coreColor);
  coreG.addColorStop(1, `${coreColor}00`);
  ctx.fillStyle = coreG;
  ctx.beginPath();
  ctx.arc(0, 0, 28 + Math.sin(b.glowPhase * 2) * 4, 0, Math.PI * 2);
  ctx.fill();

  // Eye / sensor
  ctx.fillStyle = b.tier >= 2 ? '#ff3300' : '#aa33ff';
  ctx.shadowColor = b.tier >= 2 ? '#ff3300' : '#aa33ff';
  ctx.shadowBlur = 20;
  ctx.beginPath();
  ctx.ellipse(0, -hh * 0.3, 16, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Structural lines
  ctx.strokeStyle = b.tier >= 2 ? '#cc4400' : '#8833cc';
  ctx.lineWidth = 2;
  ctx.shadowBlur = 8;
  ctx.shadowColor = b.tier >= 2 ? '#ff8800' : '#cc66ff';
  for (let i = -2; i <= 2; i++) {
    ctx.beginPath();
    ctx.moveTo(i * 20, -hh * 0.8);
    ctx.lineTo(i * 20, hh * 0.8);
    ctx.stroke();
  }

  // Gun mounts
  const gunColor = b.tier >= 2 ? '#ff6600' : '#9966ff';
  ctx.fillStyle = gunColor;
  ctx.shadowColor = gunColor;
  ctx.shadowBlur = 12;
  [[-hw * 0.6, hh * 0.2], [hw * 0.6, hh * 0.2], [0, hh * 0.6]].forEach(([gx, gy]) => {
    ctx.beginPath();
    ctx.arc(gx, gy, 8, 0, Math.PI * 2);
    ctx.fill();
  });

  ctx.restore();

  // HP bar
  const barW = b.w * 1.6;
  const barX = -barW / 2;
  const barY = -hh - 22;
  ctx.fillStyle = '#1a0000';
  ctx.fillRect(barX, barY, barW, 10);
  const pct = b.hp / b.maxHp;
  const hpGrad = ctx.createLinearGradient(barX, 0, barX + barW, 0);
  hpGrad.addColorStop(0, '#ff0000');
  hpGrad.addColorStop(0.5, '#ff6600');
  hpGrad.addColorStop(1, '#ffcc00');
  ctx.fillStyle = hpGrad;
  ctx.fillRect(barX, barY, barW * pct, 10);
  ctx.strokeStyle = '#ff4400';
  ctx.lineWidth = 1;
  ctx.strokeRect(barX, barY, barW, 10);

  // BOSS label
  ctx.fillStyle = '#ff4400';
  ctx.font = 'bold 12px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(`BOSS  ${Math.round(pct * 100)}%`, 0, barY - 4);

  ctx.restore();
}

function bossFire() {
  if (!boss || !boss.entryDone) return;
  bossFireTick++;
  const rate = Math.max(15, 35 - wave * 2);
  if (bossFireTick % rate !== 0) return;

  const pattern = bossBulletPattern % 4;
  const speed = 3.5 + boss.tier * 0.5;

  if (pattern === 0) {
    // Spiral
    for (let i = 0; i < 8; i++) {
      const ang = bossAngle + (i * Math.PI * 2 / 8);
      enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang) * speed, vy: Math.sin(ang) * speed, r: 5, color: '#00ffcc' });
    }
    bossAngle += 0.2;
  } else if (pattern === 1) {
    // Aimed spread
    const dx = player.x - boss.x;
    const dy = player.y - boss.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    for (let a = -0.4; a <= 0.4; a += 0.2) {
      const cos = Math.cos(a), sin = Math.sin(a);
      const nx = (dx / dist) * speed;
      const ny = (dy / dist) * speed;
      enemyBullets.push({ x: boss.x, y: boss.y, vx: nx * cos - ny * sin, vy: nx * sin + ny * cos, r: 5, color: '#ff4400' });
    }
  } else if (pattern === 2) {
    // Ring burst
    for (let i = 0; i < 16; i++) {
      const ang = (i / 16) * Math.PI * 2;
      enemyBullets.push({ x: boss.x, y: boss.y, vx: Math.cos(ang) * speed * 0.8, vy: Math.sin(ang) * speed * 0.8, r: 4, color: '#ffcc00' });
    }
  } else {
    // Twin cannon aimed
    [[-40, 20], [40, 20], [0, 50]].forEach(([ox, oy]) => {
      const dx = player.x - (boss.x + ox);
      const dy = player.y - (boss.y + oy);
      const dist = Math.sqrt(dx * dx + dy * dy);
      enemyBullets.push({ x: boss.x + ox, y: boss.y + oy, vx: dx / dist * speed * 1.2, vy: dy / dist * speed * 1.2, r: 6, color: '#cc44ff' });
    });
  }

  if (bossFireTick % (rate * 6) === 0) bossBulletPattern++;
}

// ─── BOMB ──────────────────────────────────────────────────────
let bombFlash = 0;

function fireBomb() {
  if (player.bombs <= 0) return;
  player.bombs--;
  bombFlash = 28;
  enemyBullets = [];
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.hp -= 700;
    e.hitFlash = 10;
    spawnDamageNumber(e.x, e.y - e.size, 700);
    spawnExplosion(e.x, e.y, 18, '#ff44aa', '#ffffff', false);
    if (e.hp <= 0) {
      score += e.score;
      spawnPowerUp(e.x, e.y);
      enemies.splice(i, 1);
    }
  }
  if (boss && boss.entryDone && !boss.dead) {
    boss.hp -= 1200;
    boss.hitFlash = 12;
    spawnDamageNumber(boss.x, boss.y - 70, 1200);
    spawnExplosion(boss.x, boss.y, 45, '#ff44aa', '#ffffff', true);
    if (boss.hp <= 0) {
      boss.dead = true;
      score += 5000 + wave * 1000;
      setTimeout(() => {
        boss = null;
        wave++;
        level++;
        gameState = STATE.LEVEL_UP;
        levelUpTimer = 180;
      }, 800);
    }
  }
}

function updateBombFlash() {
  if (bombFlash > 0) bombFlash--;
}

function drawBombFlash() {
  if (bombFlash <= 0) return;
  ctx.save();
  ctx.globalAlpha = bombFlash / 40;
  ctx.fillStyle = '#ff44aa';
  ctx.shadowBlur = 60;
  ctx.shadowColor = '#ffffff';
  ctx.fillRect(0, 0, BASE_W, BASE_H);
  ctx.globalAlpha = bombFlash / 28;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 8;
  ctx.beginPath();
  ctx.arc(player.x, player.y, (28 - bombFlash) * 35, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

// ─── PLAYER DRAWING ────────────────────────────────────────────
function drawPlayer() {
  if (player.dead) return;
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    player.invincible--;
    return;
  }
  if (player.invincible > 0) player.invincible--;

  player.thrusterPhase += 0.2;
  const { x, y, w, h } = player;

  // Thruster fire
  ctx.shadowBlur = 28;
  ctx.shadowColor = '#3ff8ff';
  const thrustLen = 38 + Math.sin(player.thrusterPhase) * 12;
  [
    [0, 20, 7, thrustLen],
    [-17, 24, 5, thrustLen * 0.72],
    [17, 24, 5, thrustLen * 0.72]
  ].forEach(([fx, fy, fw, fh]) => {
    const thrustGrad = ctx.createRadialGradient(fx, fy, 0, fx, fy + fh * 0.45, fh * 0.75);
    thrustGrad.addColorStop(0, '#ffffff');
    thrustGrad.addColorStop(0.16, '#9ffcff');
    thrustGrad.addColorStop(0.42, '#168cff');
    thrustGrad.addColorStop(0.72, '#ff7a18');

    ctx.beginPath();
    ctx.ellipse(fx, fy + fh * 0.35, fw * 1.4, fh * 0.58, 0, 0, Math.PI * 2);

  });

  // Shield bubble
  if (player.shield > 0) {
    ctx.shadowColor = '#00aaff';

    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(0, 0, 35, 0, Math.PI * 2);

  }

  // Main hull
  ctx.shadowBlur = 22;

  const hull = ctx.createLinearGradient(0, -h / 2, 0, h / 2);
  hull.addColorStop(0, '#ffffff');

  hull.addColorStop(0.48, '#6f8194');
  hull.addColorStop(1, '#131821');
  ctx.fillStyle = hull;
  ctx.beginPath();
  ctx.moveTo(0, -h * 0.68);
  ctx.lineTo(-w * 0.16, -h * 0.24);
  ctx.lineTo(-w * 0.72, h * 0.2);
  ctx.lineTo(-w * 0.34, h * 0.3);
  ctx.lineTo(-w * 0.2, h * 0.58);
  ctx.lineTo(0, h * 0.43);
  ctx.lineTo(w * 0.2, h * 0.58);
  ctx.lineTo(w * 0.34, h * 0.3);
  ctx.lineTo(w * 0.72, h * 0.2);
  ctx.lineTo(w * 0.16, -h * 0.24);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,0.55)';
  ctx.lineWidth = 1.2;
  ctx.stroke();

  // Cockpit glass
  const glass = ctx.createLinearGradient(0, -h * 0.45, 0, h * 0.06);
  glass.addColorStop(0, '#ffffff');
  glass.addColorStop(0.22, '#8bf7ff');
  glass.addColorStop(0.8, '#124d78');
  glass.addColorStop(1, '#07111f');
  ctx.fillStyle = glass;
  ctx.shadowColor = '#00aaff';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.ellipse(0, -h * 0.2, w * 0.14, h * 0.27, 0, 0, Math.PI * 2);
  ctx.fill();

  // Every collected weapon remains a distinct physical part on the ship.
  // Their order determines the visible mounting position, not just a number.
  player.componentOrder.forEach((type, index) => drawInstalledModule(type, index));

  // Hull panel lines
  ctx.strokeStyle = '#b8f6ff';
  ctx.lineWidth = 2.2;
  ctx.shadowColor = '#b8f6ff';

  ctx.beginPath();
  ctx.moveTo(-w * 0.56, h * 0.17);
  ctx.lineTo(-w * 0.13, -h * 0.12);
  ctx.lineTo(0, h * 0.3);
  ctx.lineTo(w * 0.13, -h * 0.12);
  ctx.lineTo(w * 0.56, h * 0.17);
  ctx.moveTo(-w * 0.24, h * 0.42);
  ctx.lineTo(w * 0.24, h * 0.42);
  ctx.stroke();

  // The ship starts with one integrated photon emitter; further upgrades are
  // the externally mounted modules drawn above.
  ctx.fillStyle = '#d7e4f2';
  ctx.shadowBlur = 0;
  ctx.fillRect(-3, -h * 0.58 - 4, 6, 17);

  ctx.fillStyle = 'rgba(255,255,255,0.75)';

  ctx.restore();
}

// ─── COLLISION DETECTION ───────────────────────────────────────
function rectCircle(rx, ry, rw, rh, cx, cy, cr) {
  const nearX = clamp(cx, rx, rx + rw);
  const nearY = clamp(cy, ry, ry + rh);
  const dx = cx - nearX, dy = cy - nearY;
  return dx * dx + dy * dy < cr * cr;
}

function circleCircle(x1, y1, r1, x2, y2, r2) {
  const dx = x1 - x2, dy = y1 - y2;
  return dx * dx + dy * dy < (r1 + r2) * (r1 + r2);
}

function checkCollisions() {
  // Player bullets vs enemies
  for (let bi = playerBullets.length - 1; bi >= 0; bi--) {
    const b = playerBullets[bi];
    if (b.expired) { playerBullets.splice(bi, 1); continue; }
    let hit = false;

    // vs enemies
    for (let ei = enemies.length - 1; ei >= 0; ei--) {
      const e = enemies[ei];
      const radius = b.r || b.w;
      if (circleCircle(b.x, b.y, radius, e.x, e.y, e.size)) {
        const dmg = b.damage || 30;
        e.hp -= dmg;
        e.hitFlash = 8;
        spawnDamageNumber(e.x + (Math.random() - 0.5) * 30, e.y - e.size, dmg);
        hit = true;
        if (b.type === 'missile') {
          spawnExplosion(b.x, b.y, 10, '#ffcc44', '#ffffff', false);
        }
        if (e.hp <= 0) {
          score += e.score;
          spawnExplosion(e.x, e.y, 20, '#ff8800', '#ffcc44', false);
          spawnPowerUp(e.x, e.y);
          enemies.splice(ei, 1);
        }
        if (b.pierce) {
          b.pierce--;
          hit = b.pierce <= 0;
        }
        break;
      }
    }

    // vs boss
    if (!hit && boss && boss.entryDone && !boss.dead) {
      const radius = b.r || b.w;
      if (circleCircle(b.x, b.y, radius, boss.x, boss.y, boss.w / 2)) {
        const dmg = (b.damage || 30) * 2;
        boss.hp -= dmg;
        boss.hitFlash = 6;
        spawnDamageNumber(boss.x + (Math.random() - 0.5) * 60, boss.y - 40 + (Math.random() - 0.5) * 30, dmg);
        hit = true;
        if (b.type === 'missile') {
          spawnExplosion(b.x, b.y, 14, '#ffcc44', '#ffffff', false);
        }
        if (boss.hp <= 0) {
          boss.dead = true;
          score += 5000 + wave * 1000;
          spawnExplosion(boss.x, boss.y, 60, '#ff6600', '#ffcc00', true);
          spawnExplosion(boss.x - 40, boss.y - 20, 30, '#ff3300', '#ff9900', true);
          spawnExplosion(boss.x + 40, boss.y + 10, 30, '#ff0000', '#ffff00', true);
          setTimeout(() => {
            boss = null;
            wave++;
            level++;
            gameState = STATE.LEVEL_UP;
            levelUpTimer = 180;
          }, 1500);
        }
      }
    }

    if (hit) { playerBullets.splice(bi, 1); continue; }
    if (b.y + b.h < 0 || b.x < -20 || b.x > BASE_W + 20) playerBullets.splice(bi, 1);
  }

  // Enemy bullets vs player
  if (player.invincible === 0) {
    for (let bi = enemyBullets.length - 1; bi >= 0; bi--) {
      const b = enemyBullets[bi];
      if (circleCircle(b.x, b.y, b.r, player.x, player.y, 14)) {
        if (player.shield > 0) {
          player.shield--;
          spawnExplosion(b.x, b.y, 6, '#00aaff', '#aaddff', false);
        } else {
          player.hp -= 20;
          player.invincible = 60;
          spawnExplosion(b.x, b.y, 10, '#ff6600', '#ffcc00', false);
          if (player.hp <= 0) {
            player.lives--;
            if (player.lives <= 0) {
              gameState = STATE.GAME_OVER;
              hiScore = Math.max(hiScore, score);
            } else {
              player.hp = player.maxHp;
              player.invincible = 180;
            }
          }
        }
        enemyBullets.splice(bi, 1);
      }
    }
  }

  // Enemies vs player (collision)
  for (let ei = enemies.length - 1; ei >= 0; ei--) {
    const e = enemies[ei];
    if (circleCircle(e.x, e.y, e.size, player.x, player.y, 18) && player.invincible === 0) {
      player.hp -= 40;
      player.invincible = 90;
      enemies.splice(ei, 1);
      spawnExplosion(e.x, e.y, 15, '#ff8800', '#ffcc44', false);
      if (player.hp <= 0) {
        player.lives--;
        player.hp = player.maxHp;
        if (player.lives <= 0) {
          gameState = STATE.GAME_OVER;
          hiScore = Math.max(hiScore, score);
        }
      }
    }
  }

  // Power-ups vs player
  for (let pi = powerUps.length - 1; pi >= 0; pi--) {
    const p = powerUps[pi];
    if (circleCircle(p.x, p.y, p.r, player.x, player.y, 20)) {
      if (MODULE_TYPES.includes(p.type)) {
        startModuleDocking(p);
      } else {
        collectPowerUp(p.type);
        spawnExplosion(p.x, p.y, 8, '#ffff88', '#ffffff', false);
      }
      powerUps.splice(pi, 1);
    } else if (p.y > BASE_H + 20) {
      powerUps.splice(pi, 1);
    }
  }
}

  hpGrad.addColorStop(1, '#ff8800');

  ctx.shadowBlur = player.bombs > 0 ? 10 : 0;
  ctx.font = 'bold 14px Arial';
  ctx.fillText(`NOVA BOMBS ×${player.bombs}`, BASE_W - pad, BASE_H - 68);

  ctx.shadowBlur = 0;
}

function drawHeart(x, y, r) {
  ctx.save();
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(x, y + r * 0.5);
  ctx.bezierCurveTo(x, y - r * 0.5, x - r * 1.2, y - r * 0.5, x - r * 1.2, y + r * 0.3);
  ctx.bezierCurveTo(x - r * 1.2, y + r * 1.1, x, y + r * 1.6, x, y + r * 1.6);
  ctx.bezierCurveTo(x, y + r * 1.6, x + r * 1.2, y + r * 1.1, x + r * 1.2, y + r * 0.3);
  ctx.bezierCurveTo(x + r * 1.2, y - r * 0.5, x, y - r * 0.5, x, y + r * 0.5);
  ctx.fill();
  ctx.restore();
}

// ─── GAME LOGIC ────────────────────────────────────────────────
function startGame() {
  score = 0;
  wave = 1;
  level = 1;
  player.x = BASE_W / 2; player.y = BASE_H - 100;
  player.hp = player.maxHp;
  player.lives = 3;
  player.unlockedWeapons = { laser: true, lightning: false, missiles: false };
  player.weaponLevels = { laser: 1, lightning: 0, missiles: 0 };
  player.componentOrder = ['laser'];
  player.bombs = 0;
  player.shield = 0;
  player.invincible = 0;
  player.dead = false;
  enemies = [];
  playerBullets = [];
  enemyBullets = [];
  powerUps = [];
  dockingModules = [];
  particles = [];
  damageNumbers = [];
  boss = null;
  enemyWaveTimer = 0;
  bombFlash = 0;
  gameState = STATE.PLAYING;
  spawnWave();
}

function updatePlayerBullets() {
  for (const b of playerBullets) {
    if (b.type === 'lightning') {
      b.age++;
      if (b.age > b.ttl) { b.expired = true; continue; }
    }
    if (b.type === 'missile') {
      const target = findNearestTarget(b.x, b.y);
      if (target) {
        const dx = target.x - b.x;
        const dy = target.y - b.y;
        const dist = Math.max(1, Math.sqrt(dx * dx + dy * dy));
        b.vx += (dx / dist) * 0.35;
        b.vy += (dy / dist) * 0.35;
        const speed = Math.sqrt(b.vx * b.vx + b.vy * b.vy);
        const maxSpeed = 13 + player.weaponLevels.missiles;
        if (speed > maxSpeed) {
          b.vx = b.vx / speed * maxSpeed;
          b.vy = b.vy / speed * maxSpeed;
        }
      }
    }
    b.x += b.vx;
    b.y += b.vy;
  }
}

function updatePlaying() {
  // Keyboard movement
  let moved = false;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) { player.x -= player.speed; moved = true; }
  if (keys['ArrowRight'] || keys['d'] || keys['D']) { player.x += player.speed; moved = true; }
  if (keys['ArrowUp'] || keys['w'] || keys['W']) { player.y -= player.speed; moved = true; }
  if (keys['ArrowDown'] || keys['s'] || keys['S']) { player.y += player.speed; moved = true; }
  player.x = clamp(player.x, 25, BASE_W - 25);
  player.y = clamp(player.y, BASE_H * 0.3, BASE_H - 60);

  // Auto-fire
  player.fireTick++;
  if (player.fireTick >= player.fireRate) {
    spawnPlayerBullet();
    player.fireTick = 0;
  }
  updateBombFlash();

  // Move bullets
  updatePlayerBullets();
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x < -20 || b.x > BASE_W + 20 || b.y < -20 || b.y > BASE_H + 20) enemyBullets.splice(i, 1);
  }

  // Move enemies: each squad is vulnerable while it loops into position, then
  // settles into a compact attack band near the top of the screen.
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    if (!e.entryDone) {
      e.entryTick++;
      const p = Math.min(1, e.entryTick / e.entryDuration);
      const loop = p * Math.PI * 2.45 + e.phase;
      const fade = 1 - p;
      const radiusX = e.entry === 'spiral' ? 82 : 118;
      const radiusY = e.entry === 'spiral' ? 58 : 72;
      e.x = e.startX + (e.targetX - e.startX) * p + Math.sin(loop) * radiusX * fade;
      e.y = e.startY + (e.targetY - e.startY) * p - Math.cos(loop) * radiusY * fade;
      if (p >= 1) {
        e.entryDone = true;
        e.x = e.targetX;
        e.y = e.targetY;
        e.baseX = e.x;
      }
    } else {
      e.age++;
      if (e.behavior === 'weave') {
        e.x = e.baseX + Math.sin(e.age * 0.035 + e.phase) * 72;
        e.y = e.targetY + Math.sin(e.age * 0.055 + e.phase) * 22;
      } else if (e.behavior === 'orbit') {
        e.x = e.baseX + Math.cos(e.age * 0.032 + e.phase) * 52;
        e.y = e.targetY + Math.sin(e.age * 0.064 + e.phase) * 20;
      } else if (e.behavior === 'dive') {
        e.x = e.baseX + Math.sin(e.age * 0.045 + e.phase) * 85;
        e.y = e.targetY + Math.max(0, Math.sin(e.age * 0.022 + e.phase)) * 130;
      } else if (e.behavior === 'drift') {
        e.x = e.baseX + Math.sin(e.age * 0.025 + e.phase) * 34;
        e.y = e.targetY + Math.sin(e.age * 0.04 + e.phase) * 14;
      } else {
        e.x = e.baseX + Math.sin(e.age * 0.02 + e.phase) * 24;
        e.y = e.targetY + Math.sin(e.age * 0.035 + e.phase) * 10;
      }
    }
    // Auto-fire
    e.fireTick++;
    if (e.fireTick >= e.fireRate) {
      if (e.entryDone) enemyFireBullet(e);
      e.fireTick = 0;
    }
    // Remove if off screen
    if (e.y > BASE_H + 60 || e.x < -100 || e.x > BASE_W + 100) enemies.splice(i, 1);
  }

  // Wave management
  enemyWaveTimer++;
  if (enemies.length === 0 && enemyWaveTimer > 100) {
    if (wave % 3 === 0) {
      spawnBoss();
    } else {
      wave++;
      if (wave % 3 !== 0) {
        enemyWaveTimer = 0;
        spawnWave();
      }
    }
  }

  checkCollisions();
}

function updateBoss() {
  // Keyboard movement
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) player.x -= player.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) player.x += player.speed;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) player.y -= player.speed;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) player.y += player.speed;
  player.x = clamp(player.x, 25, BASE_W - 25);
  player.y = clamp(player.y, BASE_H * 0.3, BASE_H - 60);

  player.fireTick++;
  if (player.fireTick >= player.fireRate) {
    spawnPlayerBullet();
    player.fireTick = 0;
  }
  updateBombFlash();

  updatePlayerBullets();
  for (let i = enemyBullets.length - 1; i >= 0; i--) {
    const b = enemyBullets[i];
    b.x += b.vx; b.y += b.vy;
    if (b.x < -20 || b.x > BASE_W + 20 || b.y < -20 || b.y > BASE_H + 20) enemyBullets.splice(i, 1);
  }
  if (boss && !boss.dead) bossFire();
  updateDockingModules();
  checkCollisions();
}

// ─── MAIN LOOP ─────────────────────────────────────────────────
function gameLoop() {
  requestAnimationFrame(gameLoop);
  frameCount++;

  // Background
  ctx.fillStyle = '#06040d';
  ctx.fillRect(0, 0, BASE_W, BASE_H);
  drawNebulas();
  drawStars();

  if (gameState === STATE.TITLE) {
    drawTitle();
    return;
  }

  if (gameState === STATE.GAME_OVER) {
    drawGameOver();
    return;
  }

  if (gameState === STATE.LEVEL_UP) {
    levelUpTimer--;
    // Draw minimal game scene underneath
    drawHUD();
    drawLevelUp();
    if (levelUpTimer <= 0) {
      gameState = STATE.PLAYING;
      enemyWaveTimer = 0;
      enemies = [];
      enemyBullets = [];
      playerBullets = [];
      powerUps = [];
      player.hp = Math.min(player.maxHp, player.hp + 30);
      spawnWave();
    }
    return;
  }

  // Update
  if (gameState === STATE.PLAYING) updatePlaying();
  if (gameState === STATE.BOSS) updateBoss();
  if (gameState === STATE.PLAYING) updateDockingModules();
  updateParticles();

  // Draw order: bullets, enemies, boss, player, particles, HUD, bomb flash

  // Player bullets
  for (const b of playerBullets) drawPlayerBullet(b);

  // Enemy bullets
  for (const b of enemyBullets) drawEnemyBullet(b);

  // Power-ups
  for (const p of powerUps) drawPowerUp(p);

  // Weapon modules visibly travel into their mounting points before activating.
  drawDockingModules();

  // Enemies
  for (const e of enemies) drawEnemy(e);

  // Boss
  if (boss) drawBoss(boss);

  // Player
  drawPlayer();

  // Particles + numbers
  drawParticles();

  // HUD on top
  drawHUD();
  drawBombFlash();

  // Boss entry flash
  if (boss && !boss.entryDone) {
    ctx.fillStyle = `rgba(200,0,0,${0.08 * Math.sin(frameCount * 0.3)})`;
    ctx.fillRect(0, 0, BASE_W, BASE_H);
    ctx.fillStyle = '#ff4400';
    ctx.font = 'bold 20px Arial';
    ctx.textAlign = 'center';
    ctx.shadowBlur = 15;
    ctx.shadowColor = '#ff4400';
    ctx.fillText('⚠ BOSS APPROACHING ⚠', BASE_W / 2, BASE_H / 2);
    ctx.shadowBlur = 0;
  }
}

gameLoop();
</script>
